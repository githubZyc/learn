spring.application.name=crawl-qeecc
server.port=8085

# 音频下载配置
audio.download.path=./downloads/audio
audio.download.timeout=30000

# 模型层: DashScope(通义千问) 配置
spring.ai.dashscope.api-key=${DASHSCOPE_API_KEY:sk-66a54e2d1d7b40beac4da321fb67358b}
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.embedding.options.model=text-embedding-v2

# Agent 配置
agent.system.prompt=你是一个 DJ 舞曲智能助手，可以帮助用户在 qeecc.com 网站上查找歌曲。

工作流程:
1. 理解用户查询的歌曲名称
2. 调用歌曲搜索工具查询 qeecc.com
3. 根据搜索结果告诉用户是否找到该歌曲

注意:
- 如果用户没有指定具体歌曲名，询问用户想查什么歌
- 只回答歌曲是否存在，不需要提供下载链接
- 保持回答简洁友好
