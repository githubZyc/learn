<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Qeecc 智能体 - 歌曲查询</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f8f9fa;
        }
        h1 { color: #333; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        .chat-box {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .message {
            margin: 12px 0;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: left;
        }
        .agent {
            background: #f1f3f4;
            color: #333;
        }
        .input-area {
            display: flex;
            margin-top: 16px;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #007bff; }
        button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { color: #666; font-style: italic; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 6px;
        }
        .tag-rag { background: #e8f5e9; color: #2e7d32; }
        .tag-tool { background: #fff3e0; color: #ef6c00; }
        .tag-agent { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
    <h1>🎵 Qeecc 智能体</h1>
    <p class="subtitle">
        <span class="tag tag-rag">RAG</span>
        <span class="tag tag-tool">Function Calling</span>
        <span class="tag tag-agent">Agent 编排</span>
        帮我查找 qeecc.com 上的 DJ 舞曲
    </p>

    <div class="chat-box" id="chatBox">
        <div class="message agent">
            你好！我是 DJ 舞曲智能助手 🎧<br>
            请告诉我你想查找的歌曲名称，我会去 qeecc.com 上帮你搜索。
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入歌曲名称，例如：爱情错觉"
               onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn" onclick="send()">发送</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="message user">${escapeHtml(message)}</div>`;
            chatBox.innerHTML += `<div class="message agent loading" id="loadingMsg">正在思考中...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = '';
            btn.disabled = true;

            try {
                const response = await fetch('/api/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'message=' + encodeURIComponent(message)
                });
                const text = await response.text();
                document.getElementById('loadingMsg').remove();
                chatBox.innerHTML += `<div class="message agent">${escapeHtml(text)}</div>`;
            } catch (err) {
                document.getElementById('loadingMsg').remove();
                chatBox.innerHTML += `<div class="message agent" style="color:#c62828;">请求失败: ${escapeHtml(err.message)}</div>`;
            } finally {
                btn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
