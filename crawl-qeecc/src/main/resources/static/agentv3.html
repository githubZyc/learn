<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melodify Local - 本地音乐库</title>
<style>
/* ========== 全局变量 & 基础重置 ========== */
:root {
  --bg-deep: #1a0b2e;
  --bg-card: rgba(255,255,255,0.06);
  --bg-glass: rgba(255,255,255,0.08);
  --accent: #a855f7;
  --accent-glow: rgba(168,85,247,0.4);
  --text-primary: #f0e6ff;
  --text-secondary: rgba(240,230,255,0.6);
  --border-glass: rgba(255,255,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --player-height: 80px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg-deep);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:-20%;left:-10%;width:50%;height:50%;
  background:radial-gradient(circle,rgba(168,85,247,0.15),transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;
  background:radial-gradient(circle,rgba(139,92,246,0.1),transparent 70%);
  pointer-events:none;z-index:0;
}

/* ========== 布局 ========== */
.app-container{
  display:flex;flex-direction:column;min-height:100vh;
  padding-bottom:var(--player-height);position:relative;z-index:1;
}
.header{
  display:flex;align-items:center;gap:20px;
  padding:20px 30px;
  backdrop-filter:blur(20px);
  background:rgba(26,11,46,0.8);
  border-bottom:1px solid var(--border-glass);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-size:1.6rem;font-weight:800;
  background:linear-gradient(135deg,#a855f7,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;letter-spacing:-0.5px;
}
.logo span{font-weight:300;opacity:0.7}
.search-box{
  flex:1;max-width:500px;position:relative;
}
.search-box input{
  width:100%;padding:12px 20px 12px 46px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:50px;color:var(--text-primary);font-size:0.95rem;
  outline:none;transition:all 0.3s;
}
.search-box input::placeholder{color:var(--text-secondary)}
.search-box input:focus{
  border-color:var(--accent);
  box-shadow:0 0 20px var(--accent-glow);
}
.search-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--text-secondary);font-size:1.1rem;
}
.song-count{
  font-size:0.85rem;color:var(--text-secondary);white-space:nowrap;
}

/* 分类筛选栏 */
.category-bar{
  display:flex;gap:10px;padding:16px 30px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border-glass);
}
.category-bar::-webkit-scrollbar{display:none}
.category-btn{
  padding:8px 18px;border-radius:50px;border:1px solid var(--border-glass);
  background:var(--bg-glass);color:var(--text-secondary);font-size:0.85rem;
  cursor:pointer;transition:all 0.25s;white-space:nowrap;flex-shrink:0;
}
.category-btn:hover{
  border-color:var(--accent);color:var(--text-primary);
}
.category-btn.active{
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 2px 12px var(--accent-glow);
}

/* 主内容区 */
.music-grid-area{
  flex:1;padding:24px 30px;
}
.section-title{
  font-size:1.2rem;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.section-title::before{
  content:'';width:4px;height:20px;border-radius:2px;
  background:var(--accent);
}
.music-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
}
.music-card{
  background:var(--bg-card);
  border:1px solid var(--border-glass);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;
}
.music-card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
  box-shadow:0 12px 40px rgba(168,85,247,0.2);
}
.card-cover{
  position:relative;width:100%;aspect-ratio:1;overflow:hidden;
  background:rgba(255,255,255,0.03);
}
.card-cover img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.5s;
}
.music-card:hover .card-cover img{transform:scale(1.05)}
.card-play-btn{
  position:absolute;bottom:10px;right:10px;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);border:none;color:#fff;
  font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(8px);
  transition:all 0.3s;
  box-shadow:0 4px 15px var(--accent-glow);
}
.music-card:hover .card-play-btn{opacity:1;transform:translateY(0)}
.card-play-btn:hover{transform:scale(1.1)!important}
.card-info{padding:12px 14px}
.card-title{
  font-weight:600;font-size:0.9rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-artist{
  color:var(--text-secondary);font-size:0.8rem;margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-category{
  display:inline-block;margin-top:5px;padding:2px 8px;border-radius:10px;
  font-size:0.7rem;background:rgba(168,85,247,0.15);color:var(--accent);
}
.music-card.playing{border-color:var(--accent)}
.music-card.playing .card-cover img{animation:spin 8s linear infinite}
.music-card.playing .card-play-btn{opacity:1;transform:translateY(0)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* 空状态 */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-secondary);
}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:0.5}

/* ========== 底部播放器 ========== */
.player-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--player-height);
  background:rgba(26,11,46,0.92);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border-glass);
  display:flex;align-items:center;
  padding:0 24px;gap:20px;z-index:200;
}
.player-cover{
  width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;
  background:var(--bg-glass);
}
.player-cover img{width:100%;height:100%;object-fit:cover}
.player-cover.spinning img{animation:spin 6s linear infinite}
.player-track-info{
  min-width:0;flex-shrink:0;width:180px;
}
.player-track-name{
  font-weight:600;font-size:0.9rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-track-artist{
  color:var(--text-secondary);font-size:0.8rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-controls{
  display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.player-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:transparent;color:var(--text-primary);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all 0.2s;
}
.player-btn:hover{color:var(--accent);transform:scale(1.1)}
.player-btn.play-btn{
  width:44px;height:44px;font-size:1.3rem;
  background:var(--accent);color:#fff;
  box-shadow:0 2px 12px var(--accent-glow);
}
.player-btn.play-btn:hover{transform:scale(1.08);color:#fff}
.player-progress{
  flex:1;display:flex;align-items:center;gap:10px;min-width:0;
}
.player-time{font-size:0.75rem;color:var(--text-secondary);flex-shrink:0;width:40px}
.progress-bar{
  flex:1;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);position:relative;cursor:pointer;
}
.progress-fill{
  height:100%;border-radius:2px;width:0%;
  background:linear-gradient(90deg,var(--accent),#ec4899);
  position:relative;transition:width 0.1s linear;
}
.progress-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;background:var(--accent);
  opacity:0;transition:opacity 0.2s;
}
.progress-bar:hover .progress-fill::after{opacity:1}
.player-volume{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.volume-icon{font-size:1rem;cursor:pointer}
.volume-bar{
  width:80px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);position:relative;cursor:pointer;
}
.volume-fill{
  height:100%;border-radius:2px;width:80%;
  background:var(--accent);
}
.player-bar.empty .player-cover,
.player-bar.empty .player-track-info,
.player-bar.empty .player-controls,
.player-bar.empty .player-progress,
.player-bar.empty .player-volume{opacity:0.3;pointer-events:none}
.player-placeholder{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  color:var(--text-secondary);font-size:0.9rem;
}

/* 响应式 */
@media(max-width:768px){
  .header{padding:14px 16px}
  .search-box{max-width:300px}
  .music-grid-area{padding:16px}
  .music-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
  .player-track-info{width:120px}
  .player-volume{display:none}
  .category-bar{padding:12px 16px}
}
@media(max-width:480px){
  .music-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .player-track-info{display:none}
  .song-count{display:none}
}
</style>
</head>
<body>

<div class="app-container">
  <header class="header">
    <div class="logo">Melodify <span>Local</span></div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索本地歌曲、歌手..." autocomplete="off">
    </div>
    <div class="song-count" id="songCount">加载中...</div>
  </header>

  <div class="category-bar" id="categoryBar">
    <button class="category-btn active" data-category="all">全部</button>
  </div>

  <div class="music-grid-area">
    <div class="section-title" id="sectionTitle">全部歌曲</div>
    <div class="music-grid" id="musicGrid">
      <div class="empty-state">
        <div class="icon">🎵</div>
        <div>正在加载本地音乐库...</div>
      </div>
    </div>
  </div>
</div>

<div class="player-bar empty" id="playerBar">
  <div class="player-placeholder" id="playerPlaceholder">选择一首歌开始播放</div>
  <div class="player-cover" id="playerCover"><img id="playerCoverImg" src="" alt=""></div>
  <div class="player-track-info">
    <div class="player-track-name" id="playerTrackName">未在播放</div>
    <div class="player-track-artist" id="playerTrackArtist">--</div>
  </div>
  <div class="player-controls">
    <button class="player-btn" id="prevBtn" title="上一首">⏮</button>
    <button class="player-btn play-btn" id="playBtn" title="播放">▶</button>
    <button class="player-btn" id="nextBtn" title="下一首">⏭</button>
  </div>
  <div class="player-progress">
    <span class="player-time" id="currentTime">0:00</span>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="player-time" id="totalTime">0:00</span>
  </div>
  <div class="player-volume">
    <span class="volume-icon" id="volumeIcon">🔊</span>
    <div class="volume-bar" id="volumeBar"><div class="volume-fill" id="volumeFill"></div></div>
  </div>
</div>

<audio id="audioPlayer" preload="metadata"></audio>

<script>
/**
 * Melodify Local - 本地音乐播放器
 */
const MusicPlayerApp = {
  state: {
    allSongs: [],
    filteredSongs: [],
    currentIndex: -1,
    isPlaying: false,
    volume: 0.8,
    currentCategory: 'all',
    categories: new Set(),
  },
  el: {},

  init() {
    this.el = {
      grid: document.getElementById('musicGrid'),
      search: document.getElementById('searchInput'),
      audio: document.getElementById('audioPlayer'),
      playerBar: document.getElementById('playerBar'),
      placeholder: document.getElementById('playerPlaceholder'),
      coverImg: document.getElementById('playerCoverImg'),
      coverWrap: document.getElementById('playerCover'),
      trackName: document.getElementById('playerTrackName'),
      trackArtist: document.getElementById('playerTrackArtist'),
      playBtn: document.getElementById('playBtn'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      progressFill: document.getElementById('progressFill'),
      progressBar: document.getElementById('progressBar'),
      currentTime: document.getElementById('currentTime'),
      totalTime: document.getElementById('totalTime'),
      volumeBar: document.getElementById('volumeBar'),
      volumeFill: document.getElementById('volumeFill'),
      volumeIcon: document.getElementById('volumeIcon'),
      categoryBar: document.getElementById('categoryBar'),
      sectionTitle: document.getElementById('sectionTitle'),
      songCount: document.getElementById('songCount'),
    };

    this.el.audio.volume = this.state.volume;
    this.el.volumeFill.style.width = (this.state.volume * 100) + '%';

    this.bindEvents();
    this.loadLocalSongs();
  },

  bindEvents() {
    let searchTimer = null;
    this.el.search.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => this.handleSearch(), 300);
    });
    this.el.search.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { clearTimeout(searchTimer); this.handleSearch(); }
    });

    this.el.playBtn.addEventListener('click', () => this.togglePlay());
    this.el.prevBtn.addEventListener('click', () => this.playPrev());
    this.el.nextBtn.addEventListener('click', () => this.playNext());
    this.el.progressBar.addEventListener('click', (e) => this.seekTo(e));
    this.el.volumeBar.addEventListener('click', (e) => this.setVolume(e));
    this.el.volumeIcon.addEventListener('click', () => this.toggleMute());

    this.el.audio.addEventListener('timeupdate', () => this.updateProgress());
    this.el.audio.addEventListener('loadedmetadata', () => this.updateDuration());
    this.el.audio.addEventListener('ended', () => this.playNext());
    this.el.audio.addEventListener('error', () => {
      console.error('[Local] 音频加载失败:', this.el.audio.src);
    });

    this.el.categoryBar.addEventListener('click', (e) => {
      if (e.target.classList.contains('category-btn')) {
        this.setCategory(e.target.dataset.category);
      }
    });
  },

  async loadLocalSongs() {
    try {
      const resp = await fetch('/api/songs/local');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const songs = await resp.json();
      this.state.allSongs = songs;
      this.state.filteredSongs = [...songs];

      // 提取分类
      songs.forEach(s => { if (s.category) this.state.categories.add(s.category); });
      this.renderCategories();
      this.renderGrid();
      this.updateCount();
    } catch (e) {
      console.error('[Local] 加载失败:', e);
      this.el.grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>加载失败: ${e.message}</div></div>`;
    }
  },

  renderCategories() {
    const cats = Array.from(this.state.categories).sort();
    let html = `<button class="category-btn active" data-category="all">全部 (${this.state.allSongs.length})</button>`;
    cats.forEach(cat => {
      const count = this.state.allSongs.filter(s => s.category === cat).length;
      html += `<button class="category-btn" data-category="${cat}">${cat} (${count})</button>`;
    });
    this.el.categoryBar.innerHTML = html;
  },

  setCategory(cat) {
    this.state.currentCategory = cat;
    this.el.categoryBar.querySelectorAll('.category-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.category === cat);
    });
    this.applyFilter();
  },

  handleSearch() {
    this.applyFilter();
  },

  applyFilter() {
    const kw = this.el.search.value.trim().toLowerCase();
    const cat = this.state.currentCategory;

    let list = this.state.allSongs;
    if (cat !== 'all') {
      list = list.filter(s => s.category === cat);
    }
    if (kw) {
      list = list.filter(s =>
        (s.songName && s.songName.toLowerCase().includes(kw)) ||
        (s.singer && s.singer.toLowerCase().includes(kw))
      );
    }

    this.state.filteredSongs = list;
    this.renderGrid();
    this.updateCount();

    const catLabel = cat === 'all' ? '全部' : cat;
    this.el.sectionTitle.textContent = kw ? `搜索: ${kw}` : `${catLabel}歌曲`;
  },

  updateCount() {
    const total = this.state.allSongs.length;
    const showing = this.state.filteredSongs.length;
    this.el.songCount.textContent = showing === total ? `共 ${total} 首` : `显示 ${showing} / ${total} 首`;
  },

  renderGrid() {
    const list = this.state.filteredSongs;
    if (list.length === 0) {
      this.el.grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>没有找到相关歌曲</div></div>`;
      return;
    }

    this.el.grid.innerHTML = list.map((song, idx) => {
      const isPlaying = this.state.currentIndex >= 0 &&
        this.state.filteredSongs[this.state.currentIndex]?.songId === song.songId;
      const coverUrl = `/api/songs/cover/${song.songId}`;
      return `
        <div class="music-card${isPlaying ? ' playing' : ''}" onclick="MusicPlayerApp.playSong(${idx})">
          <div class="card-cover">
            <img src="${coverUrl}" alt="${song.songName}" loading="lazy" onerror="this.style.opacity=0.3">
            <button class="card-play-btn" title="播放">${isPlaying ? '⏸' : '▶'}</button>
          </div>
          <div class="card-info">
            <div class="card-title">${song.songName || '未知歌曲'}</div>
            <div class="card-artist">${song.singer || '未知歌手'}</div>
            ${song.category ? `<span class="card-category">${song.category}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  },

  playSong(index) {
    const song = this.state.filteredSongs[index];
    if (!song || !song.songId) return;

    // 如果点击当前正在播放的歌曲，则暂停/继续
    if (this.state.currentIndex === index && this.state.isPlaying) {
      this.togglePlay();
      return;
    }

    this.state.currentIndex = index;
    this.el.playerBar.classList.remove('empty');
    this.el.placeholder.style.display = 'none';
    this.el.trackName.textContent = song.songName || '未知歌曲';
    this.el.trackArtist.textContent = song.singer || '未知歌手';
    this.el.coverImg.src = `/api/songs/cover/${song.songId}`;
    this.el.playBtn.textContent = '⏳';

    this.el.audio.src = `/api/songs/file/${song.songId}`;
    this.el.audio.play().catch(err => console.warn('[Local] 播放被阻止:', err));
    this.state.isPlaying = true;
    this.el.playBtn.textContent = '⏸';
    this.el.coverWrap.classList.add('spinning');
    this.renderGrid();
  },

  togglePlay() {
    if (this.state.currentIndex < 0) return;
    if (this.state.isPlaying) {
      this.el.audio.pause();
      this.state.isPlaying = false;
      this.el.playBtn.textContent = '▶';
      this.el.coverWrap.classList.remove('spinning');
    } else {
      this.el.audio.play().catch(() => {});
      this.state.isPlaying = true;
      this.el.playBtn.textContent = '⏸';
      this.el.coverWrap.classList.add('spinning');
    }
    this.renderGrid();
  },

  playPrev() {
    if (this.state.filteredSongs.length === 0) return;
    const idx = this.state.currentIndex <= 0
      ? this.state.filteredSongs.length - 1
      : this.state.currentIndex - 1;
    this.playSong(idx);
  },

  playNext() {
    if (this.state.filteredSongs.length === 0) return;
    const idx = this.state.currentIndex >= this.state.filteredSongs.length - 1
      ? 0
      : this.state.currentIndex + 1;
    this.playSong(idx);
  },

  updateProgress() {
    const audio = this.el.audio;
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    this.el.progressFill.style.width = pct + '%';
    this.el.currentTime.textContent = this.formatTime(audio.currentTime);
  },

  updateDuration() {
    this.el.totalTime.textContent = this.formatTime(this.el.audio.duration);
  },

  seekTo(e) {
    const rect = this.el.progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (this.el.audio.duration) {
      this.el.audio.currentTime = pct * this.el.audio.duration;
    }
  },

  formatTime(sec) {
    if (!sec || isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  },

  setVolume(e) {
    const rect = this.el.volumeBar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    this.state.volume = pct;
    this.el.audio.volume = pct;
    this.el.volumeFill.style.width = (pct * 100) + '%';
    this.updateVolumeIcon(pct);
  },

  toggleMute() {
    if (this.el.audio.volume > 0) {
      this._prevVolume = this.state.volume;
      this.el.audio.volume = 0;
      this.state.volume = 0;
      this.el.volumeFill.style.width = '0%';
      this.updateVolumeIcon(0);
    } else {
      const v = this._prevVolume || 0.8;
      this.el.audio.volume = v;
      this.state.volume = v;
      this.el.volumeFill.style.width = (v * 100) + '%';
      this.updateVolumeIcon(v);
    }
  },

  updateVolumeIcon(v) {
    this.el.volumeIcon.textContent = v === 0 ? '🔇' : v < 0.5 ? '🔉' : '🔊';
  },
};

document.addEventListener('DOMContentLoaded', () => MusicPlayerApp.init());
</script>
</body>
</html>
