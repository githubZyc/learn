<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melodify AI - 智能音乐搜索与播放</title>
<style>
/* ========== 全局变量 & 基础重置 ========== */
:root {
  --bg-deep: #1a0b2e;
  --bg-card: rgba(255,255,255,0.06);
  --bg-glass: rgba(255,255,255,0.08);
  --accent: #a855f7;
  --accent-glow: rgba(168,85,247,0.4);
  --text-primary: #f0e6ff;
  --text-secondary: rgba(240,230,255,0.6);
  --border-glass: rgba(255,255,255,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --player-height: 80px;
  --sidebar-width: 320px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg-deep);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}
/* 背景光晕 */
body::before{
  content:'';position:fixed;top:-20%;left:-10%;width:50%;height:50%;
  background:radial-gradient(circle,rgba(168,85,247,0.15),transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;
  background:radial-gradient(circle,rgba(139,92,246,0.1),transparent 70%);
  pointer-events:none;z-index:0;
}

/* ========== 布局 ========== */
.app-container{
  display:flex;flex-direction:column;min-height:100vh;
  padding-bottom:var(--player-height);position:relative;z-index:1;
}
.header{
  display:flex;align-items:center;gap:20px;
  padding:20px 30px;
  backdrop-filter:blur(20px);
  background:rgba(26,11,46,0.8);
  border-bottom:1px solid var(--border-glass);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-size:1.6rem;font-weight:800;
  background:linear-gradient(135deg,#a855f7,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;letter-spacing:-0.5px;
}
.logo span{font-weight:300;opacity:0.7}
.search-box{
  flex:1;max-width:600px;position:relative;
}
.search-box input{
  width:100%;padding:12px 20px 12px 46px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:50px;color:var(--text-primary);font-size:0.95rem;
  outline:none;transition:all 0.3s;
}
.search-box input::placeholder{color:var(--text-secondary)}
.search-box input:focus{
  border-color:var(--accent);
  box-shadow:0 0 20px var(--accent-glow);
}
.search-icon{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--text-secondary);font-size:1.1rem;
}
.main-content{
  display:flex;flex:1;gap:0;
}
.music-grid-area{
  flex:1;padding:24px 30px;overflow-y:auto;
}
.ai-sidebar{
  width:var(--sidebar-width);
  border-left:1px solid var(--border-glass);
  background:var(--bg-glass);
  backdrop-filter:blur(16px);
  padding:24px;
  display:flex;flex-direction:column;gap:16px;
  overflow-y:auto;max-height:calc(100vh - 70px - var(--player-height));
  position:sticky;top:70px;
}

/* ========== 音乐卡片网格 ========== */
.section-title{
  font-size:1.2rem;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.section-title::before{
  content:'';width:4px;height:20px;border-radius:2px;
  background:var(--accent);
}
.music-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
}
.music-card{
  background:var(--bg-card);
  border:1px solid var(--border-glass);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;
}
.music-card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
  box-shadow:0 12px 40px rgba(168,85,247,0.2);
}
.card-cover{
  position:relative;width:100%;aspect-ratio:1;overflow:hidden;
  background:rgba(255,255,255,0.03);
}
.card-cover img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.5s;
}
.music-card:hover .card-cover img{transform:scale(1.05)}
.card-play-btn{
  position:absolute;bottom:10px;right:10px;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);border:none;color:#fff;
  font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(8px);
  transition:all 0.3s;
  box-shadow:0 4px 15px var(--accent-glow);
}
.music-card:hover .card-play-btn{opacity:1;transform:translateY(0)}
.card-play-btn:hover{transform:scale(1.1)!important}
.card-info{padding:12px 14px}
.card-title{
  font-weight:600;font-size:0.9rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-artist{
  color:var(--text-secondary);font-size:0.8rem;margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-duration{
  color:var(--text-secondary);font-size:0.75rem;margin-top:4px;
}
/* 播放中卡片状态 */
.music-card.playing{border-color:var(--accent)}
.music-card.playing .card-cover img{animation:spin 8s linear infinite}
.music-card.playing .card-play-btn{opacity:1;transform:translateY(0)}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ========== AI 侧边栏 ========== */
.ai-header{
  font-size:1.1rem;font-weight:700;
  display:flex;align-items:center;gap:8px;
}
.ai-badge{
  font-size:0.65rem;padding:2px 8px;border-radius:20px;
  background:linear-gradient(135deg,#a855f7,#ec4899);
  font-weight:600;letter-spacing:0.5px;
}
.ai-content{
  background:var(--bg-glass);
  border:1px solid var(--border-glass);
  border-radius:var(--radius-sm);
  padding:16px;font-size:0.88rem;
  line-height:1.7;color:var(--text-secondary);
  min-height:120px;
  transition:all 0.4s;
}
.ai-content.active{color:var(--text-primary)}
.ai-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ai-tag{
  padding:4px 10px;border-radius:20px;font-size:0.75rem;
  background:rgba(168,85,247,0.15);color:var(--accent);
  border:1px solid rgba(168,85,247,0.3);
}
.ai-chat-area{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}
.ai-messages{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;
  min-height:0;
}
.ai-msg{
  padding:10px 14px;border-radius:var(--radius-sm);
  font-size:0.85rem;line-height:1.6;
  max-width:90%;word-break:break-word;
}
.ai-msg.bot{
  background:var(--bg-glass);border:1px solid var(--border-glass);
  align-self:flex-start;
}
.ai-msg.user{
  background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.3);
  align-self:flex-end;
}
.ai-input-row{display:flex;gap:8px}
.ai-input-row input{
  flex:1;padding:10px 14px;border-radius:50px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  color:var(--text-primary);font-size:0.85rem;outline:none;
}
.ai-input-row input:focus{border-color:var(--accent)}
.ai-input-row button{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);border:none;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ========== 底部播放器 ========== */
.player-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--player-height);
  background:rgba(26,11,46,0.92);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border-glass);
  display:flex;align-items:center;
  padding:0 24px;gap:20px;z-index:200;
}
.player-cover{
  width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;
  background:var(--bg-glass);
}
.player-cover img{width:100%;height:100%;object-fit:cover}
.player-cover.spinning img{animation:spin 6s linear infinite}
.player-track-info{
  min-width:0;flex-shrink:0;width:160px;
}
.player-track-name{
  font-weight:600;font-size:0.9rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-track-artist{
  color:var(--text-secondary);font-size:0.8rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-controls{
  display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.player-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:transparent;color:var(--text-primary);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all 0.2s;
}
.player-btn:hover{color:var(--accent);transform:scale(1.1)}
.player-btn.play-btn{
  width:44px;height:44px;font-size:1.3rem;
  background:var(--accent);color:#fff;
  box-shadow:0 2px 12px var(--accent-glow);
}
.player-btn.play-btn:hover{transform:scale(1.08);color:#fff}
.player-progress{
  flex:1;display:flex;align-items:center;gap:10px;min-width:0;
}
.player-time{font-size:0.75rem;color:var(--text-secondary);flex-shrink:0;width:40px}
.progress-bar{
  flex:1;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);position:relative;cursor:pointer;
}
.progress-fill{
  height:100%;border-radius:2px;width:0%;
  background:linear-gradient(90deg,var(--accent),#ec4899);
  position:relative;transition:width 0.1s linear;
}
.progress-fill::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;background:var(--accent);
  opacity:0;transition:opacity 0.2s;
}
.progress-bar:hover .progress-fill::after{opacity:1}
.player-volume{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.volume-icon{font-size:1rem;cursor:pointer}
.volume-bar{
  width:80px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.1);position:relative;cursor:pointer;
}
.volume-fill{
  height:100%;border-radius:2px;width:80%;
  background:var(--accent);
}
/* 无歌曲时占位 */
.player-bar.empty .player-cover,
.player-bar.empty .player-track-info,
.player-bar.empty .player-controls,
.player-bar.empty .player-progress,
.player-bar.empty .player-volume{opacity:0.3;pointer-events:none}
.player-placeholder{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  color:var(--text-secondary);font-size:0.9rem;
}

/* ========== 响应式 ========== */
@media(max-width:900px){
  .ai-sidebar{display:none}
  .header{padding:14px 16px}
  .music-grid-area{padding:16px}
  .music-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
  .player-track-info{width:120px}
  .player-volume{display:none}
}
@media(max-width:600px){
  .music-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .player-track-info{display:none}
  .player-progress{flex:1}
}
</style>
</head>
<body>

<div class="app-container">
  <!-- ====== 顶栏 ====== -->
  <header class="header">
    <div class="logo">Melodify <span>AI</span></div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索歌曲、歌手..." autocomplete="off">
    </div>
  </header>

  <!-- ====== 主体 ====== -->
  <div class="main-content">
    <div class="music-grid-area">
      <div class="section-title">搜索结果</div>
      <div class="music-grid" id="musicGrid"></div>
    </div>

    <!-- AI 侧边栏 -->
    <aside class="ai-sidebar">
      <div class="ai-header">AI 推荐 <span class="ai-badge">PRO</span></div>
      <div class="ai-content" id="aiContent">
        点击播放一首歌，AI 将为你分析音乐风格与推荐理由。
      </div>
      <div class="ai-header" style="margin-top:8px">AI 对话</div>
      <div class="ai-chat-area">
        <div class="ai-messages" id="aiMessages">
          <div class="ai-msg bot">你好！我是 Melodify AI，可以帮你搜索 qeecc.com 上的歌曲，告诉我你想找什么歌？</div>
        </div>
        <div class="ai-input-row">
          <input type="text" id="aiInput" placeholder="问我任何关于音乐的问题...">
          <button id="aiSendBtn" title="发送">▶</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- ====== 底部播放器 ====== -->
<div class="player-bar empty" id="playerBar">
  <div class="player-placeholder" id="playerPlaceholder">选择一首歌开始播放</div>
  <div class="player-cover" id="playerCover"><img id="playerCoverImg" src="" alt=""></div>
  <div class="player-track-info">
    <div class="player-track-name" id="playerTrackName">未在播放</div>
    <div class="player-track-artist" id="playerTrackArtist">--</div>
  </div>
  <div class="player-controls">
    <button class="player-btn" id="prevBtn" title="上一首">⏮</button>
    <button class="player-btn play-btn" id="playBtn" title="播放">▶</button>
    <button class="player-btn" id="nextBtn" title="下一首">⏭</button>
  </div>
  <div class="player-progress">
    <span class="player-time" id="currentTime">0:00</span>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="player-time" id="totalTime">0:00</span>
  </div>
  <div class="player-volume">
    <span class="volume-icon" id="volumeIcon">🔊</span>
    <div class="volume-bar" id="volumeBar"><div class="volume-fill" id="volumeFill"></div></div>
  </div>
</div>

<!-- 隐藏 Audio 元素 -->
<audio id="audioPlayer" preload="auto"></audio>

<script>
/**
 * Melodify AI - 音乐搜索与播放智能体
 * 封装为 MusicPlayerApp 类，避免全局变量污染
 */
const MusicPlayerApp = {
  /* ========== 状态管理 ========== */
  state: {
    currentIndex: -1,       // 当前播放索引
    isPlaying: false,       // 是否正在播放
    filteredList: [],       // 过滤后的歌曲列表
    volume: 0.8,            // 音量 0~1
    hotSongs: [],           // 从后端加载的热门歌曲
    currentPlayUrl: '',     // 当前播放链接
    currentPic: '',         // 当前歌曲封面
  },

  /* ========== DOM 引用 ========== */
  el: {},

  /* ========== 初始化 ========== */
  init() {
    // 缓存 DOM 元素
    this.el = {
      grid: document.getElementById('musicGrid'),
      search: document.getElementById('searchInput'),
      audio: document.getElementById('audioPlayer'),
      playerBar: document.getElementById('playerBar'),
      placeholder: document.getElementById('playerPlaceholder'),
      coverImg: document.getElementById('playerCoverImg'),
      coverWrap: document.getElementById('playerCover'),
      trackName: document.getElementById('playerTrackName'),
      trackArtist: document.getElementById('playerTrackArtist'),
      playBtn: document.getElementById('playBtn'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      progressFill: document.getElementById('progressFill'),
      progressBar: document.getElementById('progressBar'),
      currentTime: document.getElementById('currentTime'),
      totalTime: document.getElementById('totalTime'),
      volumeBar: document.getElementById('volumeBar'),
      volumeFill: document.getElementById('volumeFill'),
      volumeIcon: document.getElementById('volumeIcon'),
      aiContent: document.getElementById('aiContent'),
      aiMessages: document.getElementById('aiMessages'),
      aiInput: document.getElementById('aiInput'),
      aiSendBtn: document.getElementById('aiSendBtn'),
      sectionTitle: document.querySelector('.section-title'),
    };

    // 设置音量
    this.el.audio.volume = this.state.volume;

    // 绑定事件
    this.bindEvents();

    // 从后端加载热门歌曲
    this.loadHotSongs();
  },

  /* ========== 事件绑定 ========== */
  bindEvents() {
    // 搜索：输入防抖 + 回车触发后端搜索
    let searchTimer = null;
    this.el.search.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => this.handleSearch(), 400);
    });
    this.el.search.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { clearTimeout(searchTimer); this.handleSearch(); }
    });

    // 播放控制
    this.el.playBtn.addEventListener('click', () => this.togglePlay());
    this.el.prevBtn.addEventListener('click', () => this.playPrev());
    this.el.nextBtn.addEventListener('click', () => this.playNext());

    // 进度条拖动
    this.el.progressBar.addEventListener('click', (e) => this.seekTo(e));

    // 音量
    this.el.volumeBar.addEventListener('click', (e) => this.setVolume(e));
    this.el.volumeIcon.addEventListener('click', () => this.toggleMute());

    // Audio 事件
    this.el.audio.addEventListener('timeupdate', () => this.updateProgress());
    this.el.audio.addEventListener('loadedmetadata', () => this.updateDuration());
    this.el.audio.addEventListener('ended', () => this.playNext());
    this.el.audio.addEventListener('error', (e) => {
      console.error('[Melodify] 音频加载失败:', this.el.audio.src, e);
      this.addAiMessage('bot', '⚠️ 音频加载失败，可能是链接过期，请重新点击播放。');
    });

    // AI 对话
    this.el.aiSendBtn.addEventListener('click', () => this.sendAiChat());
    this.el.aiInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.sendAiChat();
    });
  },

  /* ========== 从后端加载热门歌曲 ========== */
  async loadHotSongs() {
    this.el.sectionTitle.textContent = '热门推荐';
    this.el.grid.innerHTML = '<div style="color:var(--text-secondary);padding:40px;text-align:center">加载中...</div>';

    try {
      const resp = await fetch('/api/songs/hot');
      if (resp.ok) {
        const songs = await resp.json();
        if (songs.length > 0) {
          this.state.hotSongs = songs;
          this.state.filteredList = [...songs];
          this.renderGrid();
          return;
        }
      }
    } catch (e) {
      console.warn('[Melodify] 加载热门歌曲失败:', e.message);
    }

    // 后端暂无数据（可能还在预加载中）
    this.el.grid.innerHTML = '<div style="color:var(--text-secondary);padding:40px;text-align:center">歌曲加载中，请稍候刷新页面...</div>';
  },

  /* ========== 搜索（调用后端 API） ========== */
  async handleSearch() {
    const kw = this.el.search.value.trim();
    if (!kw) {
      // 清空搜索词时，回到热门列表
      this.el.sectionTitle.textContent = '热门推荐';
      this.state.filteredList = [...this.state.hotSongs];
      this.renderGrid();
      return;
    }

    this.el.sectionTitle.textContent = `搜索: ${kw}`;
    this.el.grid.innerHTML = '<div style="color:var(--text-secondary);padding:40px;text-align:center">搜索中...</div>';

    try {
      const resp = await fetch('/api/songs/search?keyword=' + encodeURIComponent(kw));
      if (resp.ok) {
        const songs = await resp.json();
        this.state.filteredList = songs;
        this.renderGrid();
        return;
      }
    } catch (e) {
      console.warn('[Melodify] 搜索失败:', e.message);
    }

    this.state.filteredList = [];
    this.renderGrid();
  },

  /* ========== 渲染卡片网格 ========== */
  renderGrid() {
    const list = this.state.filteredList;
    if (list.length === 0) {
      this.el.grid.innerHTML = '<div style="color:var(--text-secondary);padding:40px;text-align:center">没有找到相关歌曲</div>';
      return;
    }
    this.el.grid.innerHTML = list.map((song, idx) => {
      const isPlaying = this.state.currentIndex >= 0 &&
        this.state.filteredList[this.state.currentIndex]?.songId === song.songId;
      const cover = `https://picsum.photos/seed/${song.songId}/400/400`;
      return `
        <div class="music-card${isPlaying ? ' playing' : ''}" onclick="MusicPlayerApp.playSong(${idx})">
          <div class="card-cover">
            <img src="${cover}" alt="${song.songName}" loading="lazy">
            <button class="card-play-btn" title="播放">${isPlaying ? '⏸' : '▶'}</button>
          </div>
          <div class="card-info">
            <div class="card-title">${song.songName}</div>
            <div class="card-artist">${song.singer}</div>
            <div class="card-duration">ID: ${song.songId}</div>
          </div>
        </div>`;
    }).join('');
  },

  /* ========== 播放控制 ========== */
  async playSong(index) {
    const song = this.state.filteredList[index];
    if (!song) return;

    this.state.currentIndex = index;

    // 更新播放器 UI（先显示加载状态）
    this.el.playerBar.classList.remove('empty');
    this.el.placeholder.style.display = 'none';
    this.el.trackName.textContent = song.songName;
    this.el.trackArtist.textContent = song.singer;
    this.el.playBtn.textContent = '⏳';
    this.el.coverImg.src = `https://picsum.photos/seed/${song.songId}/400/400`;

    // 更新 AI 面板
    this.updateAiPanel(song);

    try {
      // 实时获取播放链接（因链接有过期时间）
      const resp = await fetch('/api/songs/play/' + song.songId);
      if (resp.ok) {
        const data = await resp.json();
        if (data.mp3Url) {
          this.el.audio.src = data.mp3Url;
          this.el.audio.play().catch(err => console.warn('[Melodify] 播放被阻止:', err));
          this.state.isPlaying = true;
          this.el.playBtn.textContent = '⏸';
          this.el.coverWrap.classList.add('spinning');

          // 如果有封面图，更新
          if (data.pic) this.el.coverImg.src = data.pic;

          this.state.currentPlayUrl = data.mp3Url;
          this.state.currentPic = data.pic || '';
          this.renderGrid();
          return;
        }
      }
      // 获取播放链接失败
      this.el.playBtn.textContent = '▶';
      this.addAiMessage('bot', '⚠️ 获取播放链接失败，请尝试其他歌曲。');
    } catch (e) {
      console.error('[Melodify] 获取播放链接失败:', e);
      this.el.playBtn.textContent = '▶';
    }
  },

  togglePlay() {
    if (this.state.currentIndex < 0) return;
    if (this.state.isPlaying) {
      this.el.audio.pause();
      this.state.isPlaying = false;
      this.el.playBtn.textContent = '▶';
      this.el.coverWrap.classList.remove('spinning');
    } else {
      this.el.audio.play().catch(() => {});
      this.state.isPlaying = true;
      this.el.playBtn.textContent = '⏸';
      this.el.coverWrap.classList.add('spinning');
    }
    this.renderGrid();
  },

  playPrev() {
    if (this.state.filteredList.length === 0) return;
    if (this.state.currentIndex <= 0) {
      this.playSong(this.state.filteredList.length - 1);
    } else {
      this.playSong(this.state.currentIndex - 1);
    }
  },

  playNext() {
    if (this.state.filteredList.length === 0) return;
    if (this.state.currentIndex >= this.state.filteredList.length - 1) {
      this.playSong(0);
    } else {
      this.playSong(this.state.currentIndex + 1);
    }
  },

  /* ========== 进度条 ========== */
  updateProgress() {
    const audio = this.el.audio;
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    this.el.progressFill.style.width = pct + '%';
    this.el.currentTime.textContent = this.formatTime(audio.currentTime);
  },

  updateDuration() {
    this.el.totalTime.textContent = this.formatTime(this.el.audio.duration);
  },

  seekTo(e) {
    const rect = this.el.progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (this.el.audio.duration) {
      this.el.audio.currentTime = pct * this.el.audio.duration;
    }
  },

  formatTime(sec) {
    if (!sec || isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  },

  /* ========== 音量 ========== */
  setVolume(e) {
    const rect = this.el.volumeBar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    this.state.volume = pct;
    this.el.audio.volume = pct;
    this.el.volumeFill.style.width = (pct * 100) + '%';
    this.updateVolumeIcon(pct);
  },

  toggleMute() {
    if (this.el.audio.volume > 0) {
      this._prevVolume = this.state.volume;
      this.el.audio.volume = 0;
      this.state.volume = 0;
      this.el.volumeFill.style.width = '0%';
      this.updateVolumeIcon(0);
    } else {
      const v = this._prevVolume || 0.8;
      this.el.audio.volume = v;
      this.state.volume = v;
      this.el.volumeFill.style.width = (v * 100) + '%';
      this.updateVolumeIcon(v);
    }
  },

  updateVolumeIcon(v) {
    this.el.volumeIcon.textContent = v === 0 ? '🔇' : v < 0.5 ? '🔉' : '🔊';
  },

  /* ========== AI 面板 ========== */
  updateAiPanel(song) {
    const tag = song.tag || '流行';
    this.el.aiContent.innerHTML = `
      <strong>🎵 ${song.songName} - ${song.singer}</strong><br><br>
      来自 qeecc.com 的搜索结果，点击播放即可收听。<br>
      <div class="ai-tags"><span class="ai-tag">${tag}</span><span class="ai-tag">qeecc</span></div>
    `;
    this.el.aiContent.classList.add('active');
  },

  /* ========== AI 对话 (连接后端) ========== */
  sendAiChat() {
    const msg = this.el.aiInput.value.trim();
    if (!msg) return;
    this.addAiMessage('user', msg);
    this.el.aiInput.value = '';
    this.callBackendAgent(msg);
  },

  async callBackendAgent(message) {
    try {
      const resp = await fetch('/api/agent/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'message=' + encodeURIComponent(message)
      });
      if (resp.ok) {
        const text = await resp.text();
        this.addAiMessage('bot', text);
      } else {
        this.mockAiReply(message);
      }
    } catch (e) {
      console.warn('[Melodify] 后端不可用:', e.message);
      this.mockAiReply(message);
    }
  },

  mockAiReply(message) {
    const kw = message.toLowerCase();
    let reply = '我可以帮你在 qeecc.com 上搜索歌曲！在搜索框输入歌曲名或歌手名即可。';
    const found = this.state.hotSongs.find(s =>
      kw.includes(s.songName.toLowerCase()) || kw.includes(s.singer.toLowerCase())
    );
    if (found) {
      reply = `找到了！「${found.songName}」- ${found.singer}，点击左侧卡片即可播放。`;
    } else if (kw.includes('推荐') || kw.includes('好听')) {
      reply = '试试搜索「江南」「晴天」「海阔天空」等经典歌曲吧！';
    }
    this.addAiMessage('bot', reply);
  },

  addAiMessage(type, text) {
    const div = document.createElement('div');
    div.className = 'ai-msg ' + type;
    div.textContent = text;
    this.el.aiMessages.appendChild(div);
    this.el.aiMessages.scrollTop = this.el.aiMessages.scrollHeight;
  },
};

// 启动应用
document.addEventListener('DOMContentLoaded', () => MusicPlayerApp.init());
</script>
</body>
</html>
