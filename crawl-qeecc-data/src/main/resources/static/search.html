<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐搜索下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--primary-light:#818cf8;--bg:#0f172a;--surface:#1e293b;--surface-hover:#334155;--text:#f1f5f9;--text-muted:#94a3b8;--success:#22c55e;--error:#ef4444;--border:#334155;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
header{text-align:center;padding:32px 0 24px}
header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--primary),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:6px;font-size:.9rem}
.search-box{display:flex;gap:10px;margin-bottom:24px}
.search-box input{flex:1;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--primary)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box button{padding:14px 28px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.search-box button:hover{background:var(--primary-light)}
.search-box button:disabled{opacity:.5;cursor:not-allowed}
.status{text-align:center;color:var(--text-muted);padding:20px;font-size:.9rem}
.status.loading{color:var(--primary-light)}
.status.error{color:var(--error)}
.song-list{display:flex;flex-direction:column;gap:8px}
.song-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:background .2s,border-color .2s}
.song-item:hover{background:var(--surface-hover);border-color:var(--primary)}
.song-index{width:28px;text-align:center;color:var(--text-muted);font-size:.85rem;font-weight:600;flex-shrink:0}
.song-info{flex:1;min-width:0}
.song-name{font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-singer{color:var(--text-muted);font-size:.82rem;margin-top:2px}
.btn-download{padding:8px 18px;background:transparent;color:var(--primary);border:1px solid var(--primary);border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-download:hover{background:var(--primary);color:#fff}
.btn-download:disabled{opacity:.5;cursor:not-allowed}
.btn-download.downloading{border-color:var(--primary-light);color:var(--primary-light);pointer-events:none}
.btn-download.success{border-color:var(--success);color:var(--success);pointer-events:none}
.btn-download.fail{border-color:var(--error);color:var(--error);pointer-events:none}
.result-count{color:var(--text-muted);font-size:.85rem;margin-bottom:12px;padding-left:4px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.4}
@media(max-width:600px){.container{padding:12px}header h1{font-size:1.4rem}.search-box{flex-direction:column}.search-box button{width:100%}.song-item{padding:12px 14px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>音乐搜索下载</h1>
    <p>输入歌曲名或歌手名，搜索并下载</p>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="输入歌曲名或歌手名..." autofocus>
    <button id="searchBtn" onclick="doSearch()">搜索</button>
  </div>

  <div id="status" class="status" style="display:none"></div>
  <div id="resultCount" class="result-count" style="display:none"></div>
  <div id="songList" class="song-list"></div>
  <div id="emptyState" class="empty-state">
    <div class="icon">&#127925;</div>
    <p>搜索你想听的歌曲</p>
  </div>
</div>

<script>
const API_BASE = '/api/crawl';
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const statusEl = document.getElementById('status');
const resultCountEl = document.getElementById('resultCount');
const songListEl = document.getElementById('songList');
const emptyStateEl = document.getElementById('emptyState');

searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const keyword = searchInput.value.trim();
  if (!keyword) return;

  searchBtn.disabled = true;
  searchBtn.textContent = '搜索中...';
  showStatus('正在搜索 "' + keyword + '"...', 'loading');
  songListEl.innerHTML = '';
  resultCountEl.style.display = 'none';
  emptyStateEl.style.display = 'none';

  try {
    const resp = await fetch(API_BASE + '/search?keyword=' + encodeURIComponent(keyword));
    const songs = await resp.json();

    if (!songs || songs.length === 0) {
      showStatus('未找到相关歌曲', 'error');
      emptyStateEl.querySelector('p').textContent = '换个关键词试试';
      emptyStateEl.style.display = '';
      return;
    }

    statusEl.style.display = 'none';
    resultCountEl.textContent = '找到 ' + songs.length + ' 首歌曲';
    resultCountEl.style.display = '';

    songs.forEach((song, i) => {
      const item = document.createElement('div');
      item.className = 'song-item';
      item.innerHTML =
        '<span class="song-index">' + (i + 1) + '</span>' +
        '<div class="song-info">' +
          '<div class="song-name">' + escHtml(song.songName || song.fullText) + '</div>' +
          '<div class="song-singer">' + escHtml(song.singer || '未知歌手') + '</div>' +
        '</div>' +
        '<button class="btn-download" data-id="' + escHtml(song.songId) + '" onclick="doDownload(this)">下载</button>';
      songListEl.appendChild(item);
    });
  } catch (e) {
    showStatus('搜索失败: ' + e.message, 'error');
  } finally {
    searchBtn.disabled = false;
    searchBtn.textContent = '搜索';
  }
}

async function doDownload(btn) {
  const songId = btn.dataset.id;
  btn.disabled = true;
  btn.textContent = '下载中...';
  btn.className = 'btn-download downloading';

  try {
    const resp = await fetch(API_BASE + '/download?songId=' + encodeURIComponent(songId), { method: 'POST' });
    const result = await resp.json();

    if (result.success) {
      btn.textContent = '已下载';
      btn.className = 'btn-download success';
    } else {
      btn.textContent = '下载失败';
      btn.className = 'btn-download fail';
      console.error('下载失败:', result.message);
    }
  } catch (e) {
    btn.textContent = '下载失败';
    btn.className = 'btn-download fail';
    console.error('下载异常:', e);
  }
}

function showStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + cls;
  statusEl.style.display = '';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
